<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — downnow.cloud</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14; --surface: #13131f; --card: #181825;
      --border: #1e1e2e; --border-hi: #2a2a3d;
      --text: #e2e2f0; --muted: #6b6b8a; --dim: #3a3a52;
      --purple: #a78bfa; --purple-bg: rgba(167,139,250,0.10); --purple-bd: rgba(167,139,250,0.22);
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 14px;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    nav {
      background: rgba(13,13,20,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 860px; margin: 0 auto;
      padding: 0 24px; height: 52px;
      display: flex; align-items: center;
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-weight: 600; font-size: 15px; letter-spacing: -0.02em;
      color: var(--text); text-decoration: none;
    }
    .logo-mark {
      width: 28px; height: 28px; background: var(--surface);
      border: 1px solid var(--border-hi); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .not-found { text-align: center; max-width: 380px; }
    .error-badge {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
      background: var(--purple-bg); border: 1px solid var(--purple-bd); color: var(--purple);
      padding: 4px 12px; border-radius: 20px; margin-bottom: 22px;
    }
    .error-heading {
      font-size: 42px; font-weight: 700; letter-spacing: -0.04em;
      color: var(--text); line-height: 1; margin-bottom: 10px;
    }
    .error-sub { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }
    .error-path {
      font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--dim);
      background: var(--card); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 5px; display: inline-block; margin-bottom: 28px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; color: var(--text);
      background: var(--surface); border: 1px solid var(--border-hi);
      padding: 8px 18px; border-radius: 7px; text-decoration: none;
      transition: border-color 0.15s;
    }
    .back-btn:hover { border-color: var(--dim); }
    footer {
      border-top: 1px solid var(--border); padding: 20px 24px;
      text-align: center; font-size: 12px; color: var(--muted);
    }
    footer a { color: var(--dim); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="logo" href="/">
        <div class="logo-mark">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M12.5 6.5C12.5 4.29 10.71 2.5 8.5 2.5C6.79 2.5 5.33 3.58 4.74 5.09C4.33 4.89 3.86 4.79 3.37 4.83C2.04 4.94 1 6.07 1 7.4C1 8.84 2.16 10 3.6 10H12C13.1 10 14 9.1 14 8C14 7.17 13.5 6.46 12.78 6.14Z" fill="#a78bfa" opacity="0.45"/>
            <path d="M8 7L6.5 10H8.25L7.5 13L10 9H8.5L9.5 7H8Z" fill="#a78bfa"/>
          </svg>
        </div>
        downnow.cloud
      </a>
    </div>
  </nav>
  <main>
    <div class="not-found">
      <div class="error-badge">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4.5" stroke="currentColor" stroke-width="1"/><path d="M5 3v2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="5" cy="7.5" r=".5" fill="currentColor"/></svg>
        404
      </div>
      <div class="error-heading">Page not found.</div>
      <div class="error-sub">That path doesn't exist on downnow.cloud.<br/>You may have followed a broken link.</div>
      <div class="error-path" id="current-path">/</div>
      <br/>
      <a class="back-btn" href="/">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8 2.5L4 6.5l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back to status
      </a>
    </div>
  </main>
  <footer>
    downnow.cloud &mdash; executor status &nbsp;·&nbsp;
    <a href="https://discord.gg/AxFA6c3ymM">discord.gg/AxFA6c3ymM</a>
  </footer>
  <script>
    document.getElementById('current-path').textContent = window.location.pathname;
  </script>
</body>
</html>
